<!DOCTYPE html>
<html>
<head>
    <title>Chat App</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            max-width: 720px;
            margin: 40px auto;
            padding: 0 16px;
        }
        .hidden { display: none; }
        #authSection {
            max-width: 400px;
            margin: 0 auto;
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .tabs button {
            flex: 1;
            padding: 10px;
            cursor: pointer;
        }
        .tabs button.active {
            background: #333;
            color: #fff;
            border-color: #333;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        input {
            padding: 10px;
            font-size: 14px;
        }
        button[type="submit"], #logoutBtn {
            padding: 10px;
            cursor: pointer;
        }
        #authError {
            color: red;
            min-height: 20px;
        }
        #chatHeader {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #messages {
            border: 1px solid #ccc;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
            padding: 12px;
            margin: 16px 0;
        }
    </style>
</head>
<body>

<div id="authSection">
    <h1>Chat App</h1>
    <div class="tabs">
        <button type="button" id="loginTab" class="active">Login</button>
        <button type="button" id="signupTab">Sign Up</button>
    </div>
    <p id="authError"></p>

    <form id="loginForm">
        <input type="email" id="loginEmail" placeholder="Email" required>
        <input type="password" id="loginPassword" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <form id="signupForm" class="hidden">
        <input type="text" id="signupUsername" placeholder="Username" required>
        <input type="email" id="signupEmail" placeholder="Email" required>
        <input type="password" id="signupPassword" placeholder="Password (min 6 chars)" required minlength="6">
        <button type="submit">Sign Up</button>
    </form>
</div>
<script>
const authSection = document.getElementById("authSection");
const authError = document.getElementById("authError");
const loginForm = document.getElementById("loginForm");
const signupForm = document.getElementById("signupForm");
const loginTab = document.getElementById("loginTab");
const signupTab = document.getElementById("signupTab");

function showAuthError(message) {
    authError.innerText = message || "";
}

function showLoginTab() {
    loginTab.classList.add("active");
    signupTab.classList.remove("active");
    loginForm.classList.remove("hidden");
    signupForm.classList.add("hidden");
    showAuthError("");
}

function showSignupTab() {
    signupTab.classList.add("active");
    loginTab.classList.remove("active");
    signupForm.classList.remove("hidden");
    loginForm.classList.add("hidden");
    showAuthError("");
}

function saveSession(token, user) {
    localStorage.setItem("token", token);
    localStorage.setItem("user", JSON.stringify(user));
}

function clearSession() {
    localStorage.removeItem("token");
    localStorage.removeItem("user");
}

function getToken() {
    return localStorage.getItem("token");
}

async function apiRequest(url, options = {}) {
    const headers = { "Content-Type": "application/json", ...(options.headers || {}) };
    const token = getToken();
    if (token) {
        headers.Authorization = `Bearer ${token}`;
    }
    const response = await fetch(url, { ...options, headers });
    const data = await response.json();
    if (!response.ok) {
        throw new Error(data.error || "Request failed");
    }
    return data;
}

loginTab.addEventListener("click", showLoginTab);
signupTab.addEventListener("click", showSignupTab);

loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    showAuthError("");
    try {
      
        const data = await apiRequest("/api/auth/login", {
            method: "POST",
            body: JSON.stringify({
                email: document.getElementById("loginEmail").value,
                password: document.getElementById("loginPassword").value,
            }),
        });
        await handleAuthResponse(data);
       
    } catch (err) {
        showAuthError(err.message);
    }
});

signupForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    showAuthError("");
    try {     
        const data = await apiRequest("/api/auth/register", {
            method: "POST",
            body: JSON.stringify({
                username: document.getElementById("signupUsername").value,
                email: document.getElementById("signupEmail").value,
                password: document.getElementById("signupPassword").value,
            }),
        });
        await handleAuthResponse(data);
    } catch (err) {
        showAuthError(err.message);
    }
});
</script>
</body>
</html>
